<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/one-piece-tema.png" class="avatar">
      <div>
        <span class="name">Ruan radiante</span>
        <span class="username">@Ruanval</span>
      </div>
    </div>

    <p class="post-text">
      Hoje finalmente peguei top 50 da tabela do radiante✨ !
    </p>

    <div class="post-actions">
      <button id="likeBtn"> Curtir</button>
<button id="deslikeBtn"> Descurtir</button>
<p>
Curtidas: <span id="likeCount">0</span> |
Descurtidas: <span id="deslikeCount">0</span>
</p>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/less.jpg" class="avatar-small">
        <p>Nice, assim o top 1 vem! 🔥</p>
      </div>

      <div class="comment">
        <img src="assets/Leviatan-aspas-Champions-2024.jpg" class="avatar-small">
        <p>Qual sua rotina de treino🐉!</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
